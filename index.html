    <style type="text/css">
        body {
            margin: 0;
            background-color: #000200; /* المظهر الافتراضي */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            transition: background-color 0.5s ease;
        }
        /* المظاهر الإضافية (Themes) */
        body.theme-blue { background-color: #0a192f; }
        body.theme-gray { background-color: #242424; }
        body.theme-red { background-color: #3e0c0c; }
        /* --- الشريط العلوي الجديد (الأزرار اللي فوق) --- */
        .top-nav-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 20px 20px;
            flex-wrap: wrap;
            direction: rtl;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .outline-btn {
            background: transparent;
            border: 2px solid #00c3ff;
            color: #fff;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .outline-btn:hover {
            background: rgba(0, 195, 255, 0.2);
            transform: scale(1.05);
        }
        .auto-switch-active {
            border-color: #ff004c !important;
            color: #ff004c !important;
            background: rgba(255, 0, 76, 0.1) !important;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 76, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 76, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 76, 0); }
        }
        /* --- تصميم لوحة التحكم --- */
        .omar-dashboard {
            direction: rtl;
            max-width: 1000px;
            margin: 0 auto 20px auto;
            padding: 10px;
        }
        .omar-title {
            text-align: center;
            color: #ff0000;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            font-family: Impact, sans-serif;
            letter-spacing: 2px;
        }
        .top-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .time-display {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }
        .btn-show-channels {
            background-color: #4b6cb7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(75, 108, 183, 0.5);
        }
        .hide-tools-text {
            color: #a0a0a0;
            cursor: pointer;
            font-size: 14px;
        }
        .search-container {
            margin: 15px 0;
            text-align: center;
        }
        .search-input {
            width: 90%;
            max-width: 600px;
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #ffffff44;
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }
        .search-input:focus {
            border-color: #4b6cb7;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .toolbar-bottom {
            background-color: #1a1a1a;
            border: 2px solid #eab308;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .toolbar-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tool-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-delete { background-color: #fca5a5; color: #000; }
        .btn-codes { background-color: #6ee7b7; color: #000; }
        .btn-links { background-color: #67e8f9; color: #000; }
        .btn-duplicate { background-color: #fde047; color: #000; }
        .btn-select-all { background-color: #f3f4f6; color: #000; }
        .btn-close { background-color: #f87171; color: white; }
        .tool-btn:hover { transform: scale(1.05); opacity: 0.9; }
        .status-text {
            font-weight: bold;
            font-size: 16px;
            color: #fff;
        }
        /* زراير النسخ والحفظ */
        .export-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .btn-export {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .btn-copy { background: linear-gradient(45deg, #17a2b8, #117a8b); }
        .btn-save { background: linear-gradient(45deg, #28a745, #1e7e34); }
        .btn-export:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.6); }
        /* نافذة الإضافة الجماعية المنبثقة (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: #111;
            border: 2px solid #00c3ff;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            direction: rtl;
            text-align: center;
        }
        .modal-box h3 { color: #00c3ff; margin-top: 0; }
        .modal-box textarea {
            width: 100%;
            height: 120px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
            direction: ltr; /* عشان الروابط تتكتب صح */
        }
        .modal-btn {
            background: #00c3ff; color: #000; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 0 5px;
        }
        .modal-cancel { background: #f87171; color: #fff; }
        /* --- تصميم القنوات ومكان العرض الأصلي --- */
        .tv-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150px;
            background-color: rgba(0,0,0,0.5);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            padding: 0 20px;
        }
        .tv-container::-webkit-scrollbar { display: none; }
        .tv-box {
            display: inline-block;
            margin: 0 10px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.8);
            transition: 0.4s;
            cursor: pointer;
            border: 3px solid transparent;
            background-color: #222; /* لون خلفية عشان لو الصورة شفافة */
        }
        .tv-box:hover { transform: scale(1.15); }
        .tv-box.active-channel { border-color: #ff004c; box-shadow: 0 0 20px #ff004c; }
        /* --- تنسيق زرار إغلاق المشغل --- */
        .close-player-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: #ff004c;
            color: white;
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 9999; /* عشان يبقى فوق الفيديو دايماً */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .close-player-btn:hover {
            transform: scale(1.1);
            background: #cc003d;
        }
        /* --- التعديل الجديد لعرض الشاشة الكامل --- */
        #video-wrapper {
            position: relative; /* مهم جداً عشان زرار الإغلاق يفضل جواه */
            width: 98%;	
            max-width: 100%;	
            aspect-ratio: 16 / 9; /* التعديل هنا لملء العرض والقضاء على الحواف السوداء */
            height: auto; /* التعديل هنا لتجاوب الارتفاع مع الأبعاد */
            min-height: 400px;
            margin: 20px auto;
            background: #000;
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #iframe-wrapper {
            width: 100%;
            height: 100%;
            display: block;
        }
        #hls-player, #iframe-player {	
            width: 100%;	
            height: 100%;	
            border: none;	
            display: block;
            object-fit: fill;	
        }
        
        .hidden { display: none !important; }
        footer {
            text-align: center;
            padding: 30px;
            background: #000;
            border-top: 1px solid #333;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // --- التعديل هنا: مانع النوافذ المنبثقة الإعلانية (Pop-up Blocker) ---
        window.open = function() { console.log("تم حظر نافذة إعلانية منبثقة"); return null; };
        // ---------------------------------------------------------------------
        // 1. تشغيل الساعة لايف
        function runClock() {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            if(clockEl) {
                clockEl.innerText = now.toLocaleTimeString('en-US', { hour12: false }) + ' ⏱';
            }
        }
        setInterval(runClock, 1000);
        runClock();
        // 2. إخفاء وإظهار الأدوات
        function toggleTools() {
            const panel = document.getElementById('toolsPanel');
            const search = document.getElementById('searchArea');
            const isHidden = panel.style.display === 'none';
            panel.style.display = isHidden ? 'flex' : 'none';
            search.style.display = isHidden ? 'block' : 'none';
        }
        // 3. مشغل الفيديو
        const hlsVideo = document.getElementById('hls-player');
        const iframeVideo = document.getElementById('iframe-player');
        let hlsInstance = null;
        // --- الدالة الجديدة لإغلاق المشغل ---
        function closePlayer() {
            document.getElementById('video-wrapper').style.display = 'none';
            hlsVideo.pause();
            iframeVideo.src = "";
            const allBoxes = document.querySelectorAll('.tv-box');
            allBoxes.forEach(box => box.classList.remove('active-channel'));
        }
        function playVideo(element, url) {
            document.getElementById('video-wrapper').style.display = 'flex';
            const allBoxes = document.querySelectorAll('.tv-box');
            allBoxes.forEach(box => box.classList.remove('active-channel'));
            if(element) element.classList.add('active-channel');
            hlsVideo.pause();
            hlsVideo.classList.add('hidden');
            iframeVideo.src = "";	
            if (url.includes('.m3u8')) {
                hlsVideo.classList.remove('hidden');
                iframeVideo.parentElement.classList.add('hidden');
                if (Hls.isSupported()) {
                    if(hlsInstance) hlsInstance.destroy();
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(url);
                    hlsInstance.attachMedia(hlsVideo);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        hlsVideo.muted = false; // التعديل لضمان تشغيل الصوت
                        hlsVideo.play();
                    });
                } else if (hlsVideo.canPlayType('application/vnd.apple.mpegurl')) {
                    hlsVideo.src = url;
                    hlsVideo.muted = false; // التعديل لضمان تشغيل الصوت
                    hlsVideo.play();
                }
            } else {
                hlsVideo.classList.add('hidden');
                iframeVideo.parentElement.classList.remove('hidden');
                iframeVideo.src = url;
            }
        }
        // ================= الإضافات الجديدة =================
        // 4. تشغيل رابط مباشر
        function playDirectLink() {
            const url = prompt("هندسة، حط رابط البث هنا (سواء m3u8 أو رابط صفحة):");
            if(url && url.trim() !== "") {
                playVideo(null, url.trim());
            }
        }
        // 5. الإضافة الجماعية
        function openBulkModal() {
            document.getElementById('bulkModal').style.display = 'flex';
        }
        function closeBulkModal() {
            document.getElementById('bulkModal').style.display = 'none';
            document.getElementById('bulkInput').value = '';
        }
        function applyBulkAdd() {
            const input = document.getElementById('bulkInput').value.trim();
            if(!input) return alert("اكتب الروابط الأول يا هندسة!");
            const lines = input.split('\n');
            const container = document.getElementById('channelsContainer');
            let count = 0;
            lines.forEach(line => {
                const parts = line.split('|');
                if(parts.length >= 2) {
                    const logoUrl = parts[0].trim();
                    const streamUrl = parts[1].trim();
                    const a = document.createElement('a');
                    a.href = "javascript:void(0)";
                    a.className = 'tv-box';
                    a.style.backgroundImage = `url('${logoUrl}')`;
                    a.setAttribute('onclick', `playVideo(this, '${streamUrl}')`);
                    container.appendChild(a);
                    count++;
                }
            });
            closeBulkModal();
            if(count > 0) alert(`عاش! تم إضافة ${count} قناة بنجاح.`);
        }
        // 6. تغيير المظهر (Theme)
        let themeIndex = 0;
        const themes = ['', 'theme-blue', 'theme-gray', 'theme-red'];
        function toggleTheme() {
            themeIndex = (themeIndex + 1) % themes.length;
            document.body.className = themes[themeIndex];
        }
        // 7. تقليب تلقائي كل 20 ثانية
        let autoSwitchTimer = null;
        function toggleAutoSwitch() {
            const btn = document.getElementById('autoSwitchBtn');
            if (autoSwitchTimer !== null) {
                clearInterval(autoSwitchTimer);
                autoSwitchTimer = null;
                btn.innerText = '⏱ تقليب تلقائي: متوقف';
                btn.classList.remove('auto-switch-active');
            } else {
                btn.innerText = '⏱ تقليب تلقائي: شغال (20ث)';
                btn.classList.add('auto-switch-active');
                autoSwitchTimer = setInterval(() => {
                    const channels = document.querySelectorAll('.tv-box');
                    if(channels.length === 0) return;
                    let activeIndex = 0;
                    channels.forEach((box, index) => {
                        if(box.classList.contains('active-channel')) activeIndex = index;
                    });
                    let nextIndex = (activeIndex + 1) % channels.length;
                    channels[nextIndex].click();
                }, 20000);
            }
        }
        // ================= أدوات التصدير =================
        function copySourceCode() {
            const code = document.documentElement.outerHTML;
            navigator.clipboard.writeText(code).then(() => {
                alert("✅ تم نسخ الكود بالكامل! القنوات الجديدة اللي ضفتها هتتنسخ معاك.");
            });
        }
        function saveAsFile() {
            const code = document.documentElement.outerHTML;
            const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'OMAR_TV_Updated.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        // ================= إضافة تسجيل الـ Service Worker =================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then((registration) => {
                    console.log('عاش يا هندسة! Service Worker اتسجل بنجاح:', registration.scope);
                }).catch((error) => {
                    console.log('في مشكلة في تسجيل الـ Service Worker:', error);
                });
            });
        }

        /* === مانع الإعلانات المتقدم المحسّن (v2) - تم تحسينه بالكامل === */
        (function() {
            console.log('%c✅ مانع الإعلانات المتقدم v2 مفعّل بنجاح بواسطة OMAR TV', 'color:#ff004c;font-weight:bold;font-size:14px');

            // 1. تعزيز مانع النوافذ المنبثقة
            const originalOpen = window.open;
            window.open = function(url, target) {
                console.log('%c🚫 نافذة إعلانية منبثقة تم حظرها', 'color:#ff004c');
                return null;
            };

            // 2. مانع متقدم للـ popups عبر beforeunload و click
            window.onbeforeunload = function() { return null; };
            document.addEventListener('click', function(e) {
                if (e.target && (e.target.target === '_blank' || e.target.getAttribute('target') === '_blank')) {
                    e.preventDefault();
                    console.log('%c🚫 رابط popup تم منعه', 'color:#ff004c');
                }
            }, true);

            // 3. دالة تنظيف فورية وقوية
            function aggressiveCleanup() {
                const selectors = '[id*="ad"],[class*="ad"],[class*="ads"],.ad,.ads,.google_ads,.taboola,.sponsored,[data-ad]';
                document.querySelectorAll(selectors).forEach(el => {
                    if (el && el.parentNode) {
                        el.remove();
                        console.log('%c🧹 إعلان تم حذفه', 'color:#00ff00');
                    }
                });
            }

            // 4. MutationObserver محسن (يراقب التغييرات بدقة أعلى)
            const adObserver = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.addedNodes && mutation.addedNodes.length > 0) {
                        mutation.addedNodes.forEach((node) => {
                            if (node.nodeType === Node.ELEMENT_NODE) {
                                // فحص العنصر نفسه
                                if (node.matches && node.matches('[id*="ad"],[class*="ad"],[class*="ads"],.ad,.ads,.google_ads,.taboola')) {
                                    node.remove();
                                }
                                // فحص العناصر الداخلية
                                const innerAds = node.querySelectorAll && node.querySelectorAll('[id*="ad"],[class*="ad"],[class*="ads"],.ad,.ads,.google_ads,.taboola');
                                innerAds.forEach(ad => ad.remove());
                            }
                        });
                    }
                });
            });

            // تشغيل المراقبة على الصفحة كاملة
            adObserver.observe(document.documentElement, {
                childList: true,
                subtree: true,
                attributes: true,
                attributeFilter: ['style', 'class']
            });

            // 5. تنظيف دوري كل 800 ملي ثانية (أقوى من v1)
            setInterval(aggressiveCleanup, 800);

            // 6. تنظيف فوري عند تحميل الصفحة + بعد 300ms و 1000ms
            window.addEventListener('load', () => {
                aggressiveCleanup();
                setTimeout(aggressiveCleanup, 300);
                setTimeout(aggressiveCleanup, 1000);
                setTimeout(aggressiveCleanup, 2000);
            });

            // 7. حماية خاصة للمشغل (يمنع أي إعلانات داخل الفيديو)
            const videoWrapper = document.getElementById('video-wrapper');
            if (videoWrapper) {
                const playerObserver = new MutationObserver(aggressiveCleanup);
                playerObserver.observe(videoWrapper, { childList: true, subtree: true });
            }

            console.log('%c🚀 مانع الإعلانات v2 جاهز وأقوى من أي وقت مضى!', 'color:#00ff00;font-weight:bold');
        })();
    </script>
